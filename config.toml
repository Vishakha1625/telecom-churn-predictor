[theme]
base                     = "dark"
backgroundColor          = "#0F1117"
secondaryBackgroundColor = "#161B27"
textColor                = "#E8EDF5"
primaryColor             = "#4F8EF7"
font                     = "sans serif"

[server]
headless                 = true
enableCORS               = false
enableXsrfProtection     = false
maxUploadSize            = 200

[browser]
gatherUsageStats         = false

[runner]
magicEnabled             = false